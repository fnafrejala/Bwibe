<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128" aria-labelledby="title desc" role="img">
  <title id="title">Pope icon for Bonzi</title>
  <desc id="desc">Simple vector pope with mitre, face, and robe in Bonzi style colors</desc>
  <!-- Robe -->
  <rect x="0" y="72" width="128" height="56" rx="8" ry="8" fill="#6A0DAD" />
  <!-- Head -->
  <circle cx="64" cy="48" r="22" fill="#F5D6B1" stroke="#000" stroke-width="1" />
  <!-- Eyes -->
  <circle cx="56" cy="44" r="2.5" fill="#000" />
  <circle cx="72" cy="44" r="2.5" fill="#000" />
  <!-- Smile -->
  <path d="M54 54 Q64 60 74 54" stroke="#6B3B2A" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Mitre (hat) -->
  <path d="M24 18 C44 4, 84 4, 104 18 L78 64 L50 64 Z" fill="#FFF9E6" stroke="#C8A800" stroke-width="2"/>
  <!-- Cross on mitre -->
  <rect x="60" y="20" width="8" height="24" rx="2" ry="2" fill="#C8A800" />
  <rect x="52" y="30" width="24" height="8" rx="2" ry="2" fill="#C8A800" />
  <!-- Collar -->
  <path d="M34 70 Q64 86 94 70 L94 72 Q64 92 34 72 Z" fill="#FFEAA7" stroke="#C8A800" stroke-width="1"/>
  <!-- Accent: simple shadow under head -->
  <ellipse cx="64" cy="70" rx="26" ry="6" fill="#000" opacity="0.06" />
</svg>
